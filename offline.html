<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Intake Studio | Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Noto Sans TC", sans-serif;
        background: linear-gradient(180deg, #eff5fb, #dbe8f4);
        color: #16324f;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 28px;
        background: rgba(255,255,255,0.92);
        box-shadow: 0 24px 60px rgba(17, 36, 56, 0.14);
      }
      h1 { margin: 0 0 12px; }
      p { margin: 0; line-height: 1.7; }
    </style>
  </head>
  <body>
    <main>
      <h1>目前處於離線模式</h1>
      <p>已安裝的 Azure Intake Studio 仍可瀏覽先前快取的問卷與報表介面。若需要最新內容，請在網路恢復後重新整理頁面。</p>
    </main>
  </body>
</html>
